<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TaxLens — CPA Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0c0f;
    --bg-1: #0f1216;
    --bg-2: #14181d;
    --bg-3: #1a1f26;
    --bg-hover: #1d232b;
    --border: #232a33;
    --border-strong: #2e3742;
    --fg: #e6ebf2;
    --fg-1: #c2cad4;
    --fg-2: #8a93a0;
    --fg-3: #5b636e;
    --accent: #d4a017;     /* amber/gold — Bloomberg signature */
    --accent-2: #6ee7b7;   /* mint */
    --green: #2fb380;
    --amber: #d4a017;
    --orange: #e08a2b;
    --red: #e0524a;
    --blue: #4a90d9;
    --purple: #9d6dd6;
    --cyan: #4fc3d6;

    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;

    --row-h: 28px;
    --pad: 12px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "tnum" 1, "ss01" 1;
  }
  #root { height: 100vh; display: flex; flex-direction: column; }
  .mono { font-family: var(--mono); font-feature-settings: "tnum" 1; }
  .num  { font-family: var(--mono); font-feature-settings: "tnum" 1; font-variant-numeric: tabular-nums; }

  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  button:focus-visible, [role=button]:focus-visible, a:focus-visible { outline: 1px solid var(--accent); outline-offset: 1px; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #232a33; border-radius: 0; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #2e3742; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens-admin.jsx"></script>
<script type="text/babel" src="screens-cpa.jsx"></script>
<script type="text/babel" src="screens-year.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
